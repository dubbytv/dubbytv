name: Rebuild Website

on:
  release:
    types: [published]

jobs:
  trigger-rebuild:
    name: Trigger Website Rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch rebuild to website repo
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REBUILD_PAT }}
        run: |
          gh api repos/dubbytv/product/dispatches \
            -f event_type=rebuild-website \
            -f "client_payload[release_tag]=${{ github.event.release.tag_name }}" \
            -f "client_payload[prerelease]=${{ github.event.release.prerelease }}"
