# Dubby Media Server - Docker Compose
#
# Quick start:
#   1. Copy this file and create a .env with your secrets
#   2. Update the media volume path
#   3. docker compose up -d
#
# Web UI: http://localhost:3000
#
# Documentation: https://dubby.tv/docs

services:
  dubby:
    image: dubbytv/dubby:beta
    container_name: dubby
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Required - generate with: openssl rand -base64 32
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      # Optional - TMDB API key for metadata
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      # Job queue - connects to valkey service
      - REDIS_URL=redis://valkey:6379
    volumes:
      # Database and configuration
      - dubby-data:/data
      # Transcode cache (SSD recommended)
      - dubby-cache:/cache
      # Media library (read-only)
      - /path/to/media:/media:ro
      # Multiple media paths example:
      # - /path/to/movies:/media/movies:ro
      # - /path/to/tv:/media/tv:ro
    depends_on:
      valkey:
        condition: service_healthy
    # Hardware transcoding - uncomment ONE of the following:
    #
    # Intel Quick Sync:
    # devices:
    #   - /dev/dri:/dev/dri
    #
    # NVIDIA (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Redis-compatible job queue
  valkey:
    image: valkey/valkey:latest
    container_name: dubby-valkey
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  dubby-data:
  dubby-cache:
  valkey-data:
